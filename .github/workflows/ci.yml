name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Build wheel
        run: python -m pip wheel --no-deps --wheel-dir dist .
      - name: Verify wheel package data
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          cd "$(mktemp -d)"
          python -m petkit contract --version 2
          python -c 'from petkit.v2 import SCRIPT_ROOT; assert (SCRIPT_ROOT / "assemble_extended_atlas.py").is_file()'
